# swagger-mcp.yaml — Configuration Example
#
# swagger-mcp proxies multiple OpenAPI/Swagger APIs as MCP tools.
# Each entry in "apis" generates its own set of MCP proxy tools,
# prefixed with the normalized API name: {api_name}_{operation_name}
#
# Placement: put this file in your project root and swagger-mcp will
# auto-discover it. Or specify a custom path with --config / SWAGGER_MCP_CONFIG.
#
# Credentials: use ${ENV_VAR} anywhere to avoid storing secrets in this file.

server:
  transport: streamable-http    # stdio (default) | sse | streamable-http
  port: 8080
  log_level: info               # debug | info | warn | error
  enable_ui: false
  # Request headers forwarded from MCP clients to upstream API calls.
  proxy_headers:
    - Authorization
    - X-Tenant-ID

apis:
  # ── Petstore (Bearer token) ──────────────────────────────────────────────
  - name: petstore
    spec_url: https://petstore.swagger.io/v2/swagger.json
    # base_url overrides the server URL from the spec (useful for staging envs).
    base_url: https://petstore.swagger.io/v2
    auth:
      type: bearer
      token: ${PETSTORE_TOKEN}
    # Static headers added to every proxy request for this API.
    headers:
      X-Tenant: acme
      X-Version: v2
    filter:
      # Expose only pet-related endpoints.
      include_paths:
        - "^/pet.*"
      # Hide destructive operations.
      exclude_methods:
        - DELETE

  # ── GitHub API (API key in header) ──────────────────────────────────────
  - name: github
    spec_url: ./specs/github.yaml     # local file path also supported
    auth:
      type: api_key
      key: ${GITHUB_TOKEN}
      header: Authorization           # header name (default: X-API-Key)
      in: header                      # header | query | cookie (default: header)

  # ── Internal service (Basic auth) ───────────────────────────────────────
  - name: internal
    spec_url: https://internal.corp/api/swagger.json
    base_url: https://internal.corp/api
    auth:
      type: basic
      user: ${INTERNAL_USER}
      pass: ${INTERNAL_PASS}
    filter:
      # Only expose read operations.
      include_methods:
        - GET

  # ── OAuth2 client credentials ────────────────────────────────────────────
  - name: partner
    spec_url: https://partner.example.com/openapi.yaml
    auth:
      type: oauth2
      token_url: https://auth.partner.example.com/token
      client_id: ${PARTNER_CLIENT_ID}
      client_secret: ${PARTNER_CLIENT_SECRET}
      scopes:
        - "read:data"
        - "write:data"

  # ── Minimal entry (no auth, local spec) ─────────────────────────────────
  - name: local
    spec_url: ./openapi.json
